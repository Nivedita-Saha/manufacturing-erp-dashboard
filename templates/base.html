<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturing ERP Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
        nav { background: #1a2e4a; padding: 16px 32px; display: flex; align-items: center; gap: 32px; }
        nav h1 { color: #fff; font-size: 18px; }
        nav a { color: #a8c4e0; text-decoration: none; font-size: 14px; }
        nav a:hover { color: #fff; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        h2 { font-size: 22px; margin-bottom: 20px; color: #1a2e4a; }
        table { width: 100%; border-collapse: collapse; background: #fff;
                border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #1a2e4a; color: #fff; padding: 12px 16px;
             text-align: left; font-size: 13px; }
        td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0f4f8; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-critical { background: #fde8e8; color: #c0392b; }
        .badge-low { background: #fef3cd; color: #856404; }
        .badge-moderate { background: #d1ecf1; color: #0c5460; }
        .badge-healthy { background: #d4edda; color: #155724; }
        .badge-completed { background: #d4edda; color: #155724; }
        .badge-pending { background: #fef3cd; color: #856404; }
        .badge-inprogress { background: #d1ecf1; color: #0c5460; }
        .badge-cancelled { background: #fde8e8; color: #c0392b; }
        .badge-overdue { background: #fde8e8; color: #c0392b; }
        .badge-ontime { background: #d4edda; color: #155724; }
        .filter-bar { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
        .filter-bar select, .filter-bar button {
            padding: 8px 14px; border-radius: 6px; border: 1px solid #ccc;
            font-size: 13px; cursor: pointer; }
        .filter-bar button { background: #1a2e4a; color: #fff; border: none; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
        .card { background: #fff; border-radius: 8px; padding: 24px;
                box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .card h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
        .card p { font-size: 28px; font-weight: bold; color: #1a2e4a; }
    </style>
</head>
<body>
    <nav>
        <h1>⚙ Manufacturing ERP</h1>
        <a href="/">Home</a>
        <a href="/orders">Order Report</a>
        <a href="/production">Production Report</a>
        <a href="/stock">Stock Risk Report</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
